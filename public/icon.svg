<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#faf8f4"/>
  <!-- Notepad -->
  <rect x="80" y="60" width="352" height="392" rx="8" fill="#f0ebe3" stroke="#e4ddd3" stroke-width="2"/>
  <!-- Red margin line -->
  <line x1="140" y1="60" x2="140" y2="452" stroke="#e6a4a0" stroke-width="3" opacity="0.4"/>
  <!-- Ruled lines -->
  <line x1="160" y1="160" x2="380" y2="160" stroke="#e4ddd3" stroke-width="2"/>
  <line x1="160" y1="210" x2="380" y2="210" stroke="#e4ddd3" stroke-width="2"/>
  <line x1="160" y1="350" x2="380" y2="350" stroke="#e4ddd3" stroke-width="2"/>
  <line x1="160" y1="400" x2="380" y2="400" stroke="#e4ddd3" stroke-width="2"/>
  <!-- Shopping Cart Icon (vector) -->
  <g transform="translate(195, 195)" stroke="#4a8c5c" stroke-width="14" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Cart handle -->
    <path d="M0 8 L20 8 L45 95 L105 95"/>
    <!-- Cart body -->
    <path d="M30 35 L110 35 L100 80 L42 80 Z"/>
    <!-- Wheels -->
    <circle cx="55" cy="112" r="10" fill="#4a8c5c"/>
    <circle cx="95" cy="112" r="10" fill="#4a8c5c"/>
  </g>
</svg>
